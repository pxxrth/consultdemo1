<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | Lumen — Premium Online Dermatology & Aesthetic Consultancy Pakistan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<style>
  :root {
    --cream: #faf7f4;
    --warm-white: #fff9f5;
    --blush: #e8c4b0;
    --rose: #c9826b;
    --deep: #2c1f1a;
    --muted: #8a7068;
    --sage: #7a9e8e;
    --sage-light: #e8f0ec;
    --border: #e2d5cc;
    --gold: #c4a882;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--deep); min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 50px 24px 80px; text-align: center; }
  h1, h2, h3 { font-family: 'Cormorant Garamond', serif; }
  h1 { font-size: clamp(32px,6vw,56px); font-weight: 400; margin-bottom: 20px; }
  h2 { font-size: 24px; font-weight: 400; margin-bottom: 16px; }
  h3 { font-size: 18px; font-weight: 400; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; margin: 0 auto 24px; }
  table td { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  table td:first-child { color: var(--muted); width: 40%; }
  table td:last-child { color: var(--deep); font-weight: 500; }
  #countdown { font-size: 20px; font-weight: 500; color: var(--rose); margin-bottom: 24px; }
  .payment-methods { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); margin-bottom: 24px; }
  .payment-option { padding: 18px 12px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.3s, background 0.3s; }
  .payment-option.selected { border-color: var(--rose); background: var(--rose); color: white; }
  #bank-panel { margin-top: 24px; text-align: left; }
  .btn { display: inline-block; padding: 14px 28px; background: var(--gold); color: white; font-weight: 500; letter-spacing: 0.5px; border-radius: 999px; text-decoration: none; cursor: pointer; transition: background 0.3s; }
  .btn:hover { background: #9a6e45; }
</style>

<div class="container" id="main-content">
  <h1>Complete Payment</h1>
  <div id="countdown">45:00</div>

  <div class="order-summary">
    <h2>Order Summary</h2>
    <table>
      <tr><td>Plan</td><td id="summary-plan"></td></tr>
      <tr><td>Appointment</td><td id="summary-appt"></td></tr>
    </table>
  </div>

  <div class="payment-methods">
    <div class="payment-option" data-method="card">Credit / Debit Card</div>
    <div class="payment-option" data-method="paypal">PayPal</div>
    <div class="payment-option" data-method="bank">Bank Transfer</div>
  </div>

  <div id="bank-panel" style="display:none;">
    <p>Please transfer the consultation fee to the following account:</p>
    <p><strong>ABC Bank</strong><br>Account No: 1234567890<br>IBAN: PK00 ABCD 1234 5678 9012 34</p>
    <p>After sending the money, enter the transaction reference below:</p>
    <input type="text" id="transfer-reference" placeholder="Transaction reference" style="width:100%;padding:8px;margin:8px 0;" />
    <button id="proof-button" class="btn">I have sent proof</button>
  </div>
</div>

<script>
// reminder: appointments table should have a "payment_method" column
// so we can store values like 'bank_transfer'. Add to schema if not present.

function startCountdown(duration, display) {
  let timer = duration, minutes, seconds;
  const interval = setInterval(function() {
    minutes = parseInt(timer / 60, 10);
    seconds = parseInt(timer % 60, 10);
    minutes = minutes < 10 ? "0" + minutes : minutes;
    seconds = seconds < 10 ? "0" + seconds : seconds;
    display.textContent = minutes + ":" + seconds;
    if (--timer < 0) {
      clearInterval(interval);
      display.textContent = "Time expired";
      document.querySelectorAll('.payment-option').forEach(o => o.style.pointerEvents = 'none');
      const btn = document.getElementById('proof-button'); if (btn) btn.disabled = true;
    }
  }, 1000);
}

function selectPayment(method) {
  document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
  const el = document.querySelector(`.payment-option[data-method="${method}"]`);
  if (el) el.classList.add('selected');
  if (method === 'bank') {
    document.getElementById('bank-panel').style.display = 'block';
  } else {
    document.getElementById('bank-panel').style.display = 'none';
  }
}

function submitPaymentProof(bookingId) {
  if (!bookingId) { alert('Booking ID missing.'); return; }
  // update Supabase appointment record with payment method and status
  const SUPABASE_URL = 'https://nmkapqqfefqilxysxumk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ta2FwcXFmZWZxaWx4eXN4dW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTE3ODMsImV4cCI6MjA4ODIyNzc4M30.KwQmnv0p10WwCBaQHjkmH37rJ9uFWCW2Lus5HlaXZ3A';
  
  fetch(SUPABASE_URL + '/rest/v1/appointments?id=eq.' + encodeURIComponent(bookingId), {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    },
    body: JSON.stringify({
      payment_method: 'bank_transfer',
      payment_status: 'Paid'
    })
  })
  .then(r => r.json())
  .then(d => {
    console.log('Payment update response', d);
    showSuccessScreen();
  })
  .catch(err => {
    console.error('Payment update failed', err);
    alert('Unable to update payment. Please try again later.');
  });
}

function showSuccessScreen() {
  const container = document.getElementById('main-content');
  container.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding: 60px 24px;animation: fadeIn 0.6s ease;">
      <div style="width:72px;height:72px;border-radius:50%;border:3px solid #7a9e8e;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:circleIn 0.5s ease forwards;">
        <div style="width:28px;height:16px;border-left:3px solid #7a9e8e;border-bottom:3px solid #7a9e8e;transform:rotate(-45deg) translateY(-3px);"></div>
      </div>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;color:#2c1f1a;margin-bottom:12px;">Form submitted successfully.</h2>
      <p style="font-size:14px;color:#8a7068;max-width:380px;margin:0 auto 8px;line-height:1.7;">Your consultation details have been received. The next step is to book your appointment date and time.</p>
      <p style="font-size:13px;color:#8a7068;max-width:380px;margin:0 auto 36px;line-height:1.7;">Your summary PDF has been downloaded to your device.</p>
      <p style="font-size:14px;color:#6b5a4e;margin:12px auto 0;max-width:400px;line-height:1.6;">&#10003; A confirmation email has been sent to <strong id="confirm-email-display"></strong></p>
      <div style="margin:28px auto 32px;max-width:360px;background:linear-gradient(135deg,#2c1f1a,#4a2e25);border-radius:16px;padding:32px;color:white;position:relative;overflow:hidden;text-align:left;">
        <div style="position:absolute;top:-30%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,rgba(201,130,107,0.25),transparent 70%);pointer-events:none;"></div>
        <div style="filter:blur(5px);opacity:0.4;"><div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#e8c4b0;margin-bottom:10px;">✦ Exclusive Welcome Voucher</div><div style="font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:white;line-height:1;margin-bottom:6px;">PKR 5,000</div><div style="font-size:12px;color:rgba(255,255,255,0.55);margin-bottom:20px;">Redeemable at our partnered dermatology clinic</div><div style="background:rgba(255,255,255,0.1);border-radius:8px;padding:12px 16px;font-family:monospace;font-size:18px;letter-spacing:3px;color:#e8c4b0;" id="voucher-code">DERM-XXXX</div><div style="font-size:11px;color:rgba(255,255,255,0.35);margin-top:12px;">Valid for 30 days · Present at clinic reception</div></div>
        <div style="position:absolute;inset:0;backdrop-filter:blur(8px);background:rgba(44,31,26,0.6);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;"><div style="font-size:32px;margin-bottom:12px;">🔒</div><div style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.95);text-align:center;max-width:280px;line-height:1.6;">Your voucher will be revealed after your consultation</div></div>
      </div>
      <p style="font-size:12px;color:#8a7068;margin-bottom:28px;">A copy of this voucher has been sent to your WhatsApp number.</p>
      <a href="index.html" style="display:inline-block;margin-top:8px;padding:16px 40px;background:#b8865a;color:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;letter-spacing:0.5px;border-radius:999px;text-decoration:none;transition:all 0.3s;" onmouseover="this.style.background='#9a6e45'" onmouseout="this.style.background='#b8865a'">&#8592; Back to Home</a>
    </div>
  `;
}

// initialize after DOM ready
window.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const plan = params.get('plan') || 'standard';
  const date = params.get('date') || '';
  const time = params.get('time') || '';
  const bookingId = params.get('booking') || '';
  const planLabel = plan === 'premium' ? 'Premium — PKR 10,000' : 'Standard — PKR 5,000';
  document.getElementById('summary-plan').textContent = planLabel;
  document.getElementById('summary-appt').textContent = date && time ? (date + ' at ' + time) : 'TBD';

  startCountdown(45 * 60, document.getElementById('countdown'));
  document.querySelectorAll('.payment-option').forEach(el => {
    el.addEventListener('click', function() { selectPayment(this.dataset.method); });
  });
  document.getElementById('proof-button').addEventListener('click', function() {
    submitPaymentProof(bookingId);
  });
});
</script>

</body>
</html>
